name: 🪁 Weekly Kite Forecast

on:
  schedule:
    # Tous les dimanches à 7h00 UTC (8h00 heure de Paris en hiver, 9h00 en été)
    - cron: "0 7 * * 0"
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  send-forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: kitesurf-alerts/package-lock.json

      - name: Install dependencies
        working-directory: kitesurf-alerts
        run: npm ci

      - name: Send kite forecast via WhatsApp
        working-directory: kitesurf-alerts
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          STORMGLASS_API_KEY: ${{ secrets.STORMGLASS_API_KEY }}
        run: npx tsx src/index.ts
